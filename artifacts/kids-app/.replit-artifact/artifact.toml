kind = "mobile"
previewPath = "/"
title = "Детское приложение"
version = "1.0.0"
id = "artifacts/kids-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18545

[services.development]
run = "pnpm --filter @workspace/kids-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kids-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kids-app", "run", "serve" ]

[services.env]
PORT = "18545"
BASE_PATH = "/"
